name: zoway
description: "La carte de ceux qui savent"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_compass: ^0.8.0
  cupertino_icons: ^1.0.8
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  http: ^1.6.0
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  flutter_tts: ^4.2.0
  google_polyline_algorithm: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1



flutter:
  uses-material-design: true
  assets:
    - assets/images/
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/zoway_icon.png"
  adaptive_icon_background: "#FF6B00"
  adaptive_icon_foreground: "assets/images/zoway_icon.png"